"$schema" = "https://pixi.sh/v0.59.0/schema/manifest/schema.json"

[workspace]
name = "fastbdt-feedstock"
version = "2026.5.29"  # conda-smithy version used to generate this file
description = "Pixi configuration for conda-forge/fastbdt-feedstock"
authors = ["@conda-forge/fastbdt"]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]
requires-pixi = ">=0.59.0"

[dependencies]
conda-build = ">=26.3"
conda-forge-ci-setup = "4.*"
rattler-build = "*"

[tasks.inspect-all]
cmd = "inspect_artifacts --all-packages"
description = "List contents of all packages found in rattler-build build directory."
[tasks.build]
cmd = "rattler-build build --recipe recipe"
description = "Build fastbdt-feedstock directly (without setup scripts), no particular variant specified"
[tasks."build-linux_64_use_double_weightOFF"]
